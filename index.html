<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <title>dress-up-game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Thumbnail.PNG" type="image/png">

</head>

<body>

    <div id="unity-container">

        <canvas id="unity-canvas"></canvas>

        <div id="loading-screen">
            <img src="Thumbnail.PNG" alt="Logo" style="width: 200px; height: 200px;">
            <div id="loading-bar">
                <div id="loading-progress"></div>
            </div>
            <!-- <div id="loading-text">Loading...</div> -->
        </div>

    </div>

    <script>

        const buildVersion = "1.0.7";

        const buildUrl = "Build";

        const loaderUrl = buildUrl + "/a76cce770dc47015e6e974cb33b26b4f.loader.js?v=" + buildVersion;

        const config = {

            dataUrl: buildUrl + "/22a1a4cd57d115f37353e7639a34ad92.data.unityweb?v=" + buildVersion,
            frameworkUrl: buildUrl + "/81165b39d11d38eb417c5927cfe893f6.framework.js.unityweb?v=" + buildVersion,
            codeUrl: buildUrl + "/89d6e394095d12c88fa689bb45e53051.wasm.unityweb?v=" + buildVersion,

            streamingAssetsUrl: "StreamingAssets",

            companyName: "DefaultCompany",
            productName: "dress-up-game",
            productVersion: buildVersion,

        };

        const canvas = document.querySelector("#unity-canvas");
        const progressBar = document.querySelector("#loading-progress");

        function unityProgress(progress) {
            progressBar.style.width = (progress * 100) + "%";
        }

        const script = document.createElement("script");
        script.src = loaderUrl;

        script.onload = () => {

            createUnityInstance(canvas, config, unityProgress).then((unityInstance) => {

                document.querySelector("#loading-screen").style.display = "none";

            }).catch((message) => {

                alert(message);

            });

        };

        document.body.appendChild(script);

    </script>

    <script src="loading.js"></script>

</body>

<style>
    #rotate-warning {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: none;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 9999;
      font-size: 24px;
    }
    </style>
    
    <div id="rotate-warning">
      <div>
        <p>Silakan putar perangkat ke mode landscape</p>
      </div>
    </div>
    
    <script>
    function checkOrientation() {
      const warning = document.getElementById("rotate-warning");
      if (window.innerHeight > window.innerWidth) {
        // Portrait
        warning.style.display = "flex";
        document.querySelector("#unity-container").style.display = "none";
      } else {
        // Landscape
        warning.style.display = "none";
        document.querySelector("#unity-container").style.display = "block";
      }
    }
    
    window.addEventListener("resize", checkOrientation);
    window.addEventListener("orientationchange", checkOrientation);
    window.addEventListener("load", checkOrientation);
    </script>

</html>
