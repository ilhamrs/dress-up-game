<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <title>Fenyx Atelier</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Thumbnail.PNG" type="image/png">

    <style>
        /* ROTATE WARNING */
        #rotate-warning {
            position: fixed;
            inset: 0;
            background: #e9e9e9;
            display: none;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 9999;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }

        #rotate-warning img {
            width: 120px;
            margin-bottom: 25px;
            animation: rotateAnim 2s infinite;
        }

        /* Animasi baru */
        @keyframes rotateAnim {
            0% {
                transform: rotate(0deg);
            }

            75% {
                transform: rotate(-90deg);
            }

            100% {
                transform: rotate(-90deg);
            }
        }

        .rotate-main {
            font-size: 18px;
            letter-spacing: 1px;
            color: #333;
            margin-bottom: 5px;
        }

        .rotate-sub {
            font-size: 12px;
            color: #777;
        }
    </style>

</head>

<body>

    <div id="unity-container">

        <canvas id="unity-canvas"></canvas>

        <div id="loading-screen">
            <img src="Thumbnail.PNG" alt="Logo" style="width: 200px; height: 200px;">
            <div id="loading-bar">
                <div id="loading-progress"></div>
            </div>
        </div>

    </div>

    <!-- ROTATE WARNING UI -->
    <div id="rotate-warning">
        <!-- <div id="rotate-warning" onclick="skipRotate()"> -->
        <img src="phone.png" alt="Rotate Device"> <!-- GANTI sesuai path icon -->
        <div class="rotate-main">PLEASE ROTATE YOUR DEVICE</div>
        <!-- <div class="rotate-sub">(OR CLICK TO CONTINUE)</div> -->
    </div>

    <script>

        const buildVersion = "1.0.8";
        const buildUrl = "Build";
        const loaderUrl = buildUrl + "/7fbbe94b38b9aa07518af026e8e27fcb.loader.js?v=" + buildVersion;

        const config = {
            dataUrl: buildUrl + "/04f047ef94d85dd85c1e1ccfb5671250.data?v=" + buildVersion,
            frameworkUrl: buildUrl + "/81165b39d11d38eb417c5927cfe893f6.framework.js?v=" + buildVersion,
            codeUrl: buildUrl + "/97679d30451cec52192d0ba8e1834f14.wasm?v=" + buildVersion,
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Fenyx X IDS",
            productName: "Fenyx Atelier",
            productVersion: buildVersion,
        };

        const canvas = document.querySelector("#unity-canvas");
        const progressBar = document.querySelector("#loading-progress");

        function unityProgress(progress) {
            progressBar.style.width = (progress * 100) + "%";
        }

        const script = document.createElement("script");
        script.src = loaderUrl;

        script.onload = () => {
            createUnityInstance(canvas, config, unityProgress).then((unityInstance) => {
                document.querySelector("#loading-screen").style.display = "none";
            }).catch((message) => {
                alert(message);
            });
        };

        document.body.appendChild(script);

    </script>

    <script src="loading.js"></script>

    <script>
        let forceContinue = false;

        function skipRotate() {
            forceContinue = true;
            checkOrientation();
        }

        function checkOrientation() {
            const warning = document.getElementById("rotate-warning");
            const unity = document.querySelector("#unity-container");

            if (!forceContinue && window.innerHeight > window.innerWidth) {
                // Portrait
                warning.style.display = "flex";
                unity.style.display = "none";
            } else {
                // Landscape / skip
                warning.style.display = "none";
                unity.style.display = "block";
            }
        }

        window.addEventListener("resize", checkOrientation);
        window.addEventListener("orientationchange", checkOrientation);
        window.addEventListener("load", checkOrientation);
    </script>

</body>

</html>
